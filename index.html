<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
                        url('https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            color: #fff;
            text-align: center;
        }

        .container {
            position: relative;
            top: 50%;
            transform: translateY(-50%);
            padding: 0 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #ff0055;
            color: #fff;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn:hover {
            background: #ff336e;
        }

        footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Happy Birthday 🎉</h1>
        <h2>To a Wonderful Brother-in-Law</h2>

        <a href="second.html" class="btn">Enter Surprise</a>
    </div>

    <footer>Made with ❤️ For You</footer>

</body>
</html>
